<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta
      name="viewport"
      content="width=
    , initial-scale=1.0"
    />
    <title>Inspired IT</title>
    <link rel="stylesheet" href="css/style.css" />
  </head>
  <body>
    <header class="header">
      <div class="brandName">
        <h1 class="content">INSPIRED IT</h1>
        <h3 class="content">INNOVATION | DESIGN | SUCCESS</h3>
      </div>
      <div class="applicantPhoto"></div>
    </header>
    <main>
      <div class="title">
        <h1>ADMISSION FORM</h1>
      </div>
      <div class="aboutFormDetail">
        <form action="">
          <label for="formNo">Form No:</label>
          <input
            type="text"
            id="fornNo"
            name="fornNo"
            placeholder="Enter Form Number"
          />
          <label for="date">Date:</label>
          <input type="date" id="date" name="date" placeholder="" />
        </form>
      </div>
      <section class="PersonalInfo">
        <h1>PERSONAL INFORMATION</h1>
        <div class="container">
          <form action="#">
            <label for="fullName">FULL NAME</label>
            <input
              type="text"
              id="fullName"
              name="fullName"
              placeholder="Enter Your Full Name"
            />
            <label for="gender">GENDER</label>
            <input type="radio" name="gender" id="male" />
            <label for="male">MALE</label>
            <input type="radio" name="gender" id="female" />
            <label for="female">FEMALE</label>
            <label for="religion">RELIGION</label>
            <input type="text" name="religion" id="religion" />
            <label for="dateOfBirth">DATE OF BIRTH</label>
            <input type="date" name="dateOfBirth" id="dateOfBirth" />
            <label for="bloodGroup">BLOOD GROUP</label>
            <input type="text" name="bloodGroup" id="bloodGroup" />
            <label for="nationality">Nationality</label>
            <input type="text" name="nationality" id="nationality" />
            <label for="contactNo">Contact NO</label>
            <input type="number" name="contactNo" id="contactNo" />
            <label for="email">E-MAIL</label>
            <input type="email" name="email" id="email" />
            <label for="fathersName">FATHER'S NAME</label>
            <input type="text" name="fathersName" id="fathersName" />
            <label for="mothersName">MOTHER'S NAME</label>
            <input type="text" name="mothersName" id="mothersName" />
            <label for="presentAddress">PRESENT ADDRESS</label>
            <input type="text" name="presentAddress" id="presentAddress" />
            <label for="permanentAddress">PERMANENT ADRERSS</label>
            <input type="text" name="permanentAddress" id="permanentAddress" />
            <label for="gurdianName">GUARDIAN NAME</label>
            <input type="text" name="gurdianName" id="gurdianName" />
            <label for="mobileNo">MOBILE NO</label>
            <input type="tel" name="mobileNo" id="mobileNo" />
            <label for="courseName">COURSE NAME</label>
            <input type="text" name="courseName" id="courseName" />
            <label for="batchNo">BATCH NO</label>
            <input type="text" name="batchNo" id="batchNo" />
            <label for="courseDuration">COURSE DURATION</label>
            <input type="text" name="courseDuration" id="courseDuration" />
          </form>
        </div>
      </section>
    </main>
    <footer>
      <div class="authorize_signature">
        <div class="signature_line"></div>
        <label for="authorizeSignature">AUTHORIZE SIGNATURE</label>
      </div>
      <div class="studentSignature">
        <div class="signature_line"></div>
        <label for="student_signature">STUDENT SIGNATURE</label>
      </div>
    </footer>
  </body>
</html>
