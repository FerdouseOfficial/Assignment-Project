        <input
          type="text"
          id="fornNo"
          name="fornNo"
          placeholder="Enter Form Number"
        />

          <input type="radio" name="gender" id="female" />

          <label for="religion">RELIGION</label>

          <input type="text" name="permanentAddress" id="permanentAddress" />
          <label for="gurdianName">GUARDIAN NAME</label>
          <input type="text" name="gurdianName" id="gurdianName" />
          <label for="mobileNo">MOBILE NO</label>
          <input type="tel" name="mobileNo" id="mobileNo" />
          <label for="courseName">COURSE NAME</label>
          <input type="text" name="courseName" id="courseName" />
          <label for="batchNo">BATCH NO</label>
          <input type="text" name="batchNo" id="batchNo" />
          <label for="courseDuration">COURSE DURATION</label>
          <input type="text" name="courseDuration" id="courseDuration" />
