<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta
      name="viewport"
      content="width=
    , initial-scale=1.0"
    />
    <title>Inspired IT</title>
    <link rel="stylesheet" href="css/style.css" />
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css"
      integrity="sha512-2SwdPD6INVrV/lHTZbO2nodKhrnDdJK9/kg2XD1r9uGqPo1cUbujc+IYdlYdEErWNu69gVcYgdxlmVmzTWnetw=="
      crossorigin="anonymous"
      referrerpolicy="no-referrer"
    />
  </head>
  <body>
    <header class="header">
      <div class="brandName">
        <h1 class="content">
          INSP
          <span class="iconWrap">
            <span><img src="img/bulb.png" alt="" /></span>
            I
          </span>
          RED IT
        </h1>
        <h3 class="content">INNOVATION | DESIGN | SUCCESS</h3>
      </div>
      <div class="applicantPhoto"></div>
    </header>

    <main>
      <div class="title">
        <h1>ADMISSION FORM</h1>
      </div>

      <div class="aboutFormDetail">
        <form action="">
          <div class="formRow">
            <div class="inputGroup">
              <label for="formNo">Form No:</label>
              <input type="text" id="formNo" name="formNo" />
            </div>

            <div class="inputGroup">
              <label for="date">Date:</label>
              <input type="date" id="date" name="date" />
            </div>
          </div>
        </form>
      </div>

      <section class="personalInfo">
        <h1>PERSONAL INFORMATION</h1>

        <div class="container">
          <form action="#">
            <!-- FULL WIDTH -->
            <div class="formFull">
              <label for="fullName">FULL NAME</label>
              <input type="text" id="fullName" name="fullName" />
            </div>

            <!-- ROW: GENDER + RELIGION -->
            <div class="formRow">
              <div class="genderGroup">
                <label for="gender" class="gender">Gender</label>
                <div class="mf">
                  <input type="radio" name="male" id="male" />
                  <label for="male">Male</label>
                  <input type="radio" name="female" id="female" />
                  <label for="female">Female</label>
                </div>
              </div>

              <div class="inputGroup">
                <label for="religion">RELIGION</label>
                <input type="text" id="religion" name="religion" />
              </div>
            </div>

            <div class="formRow">
              <div class="inputGroup">
                <label for="bloodGroup">BLOOD GROUP</label>
                <input type="text" id="bloodGroup" name="bloodGroup" />
              </div>

              <div class="inputGroup">
                <label for="nationality">NATIONALITY</label>
                <input type="text" id="nationality" name="nationality" />
              </div>
            </div>

            <div class="formRow">
              <div class="inputGroup">
                <label for="gurdianName">GUARDIAN NAME</label>
                <input type="text" id="gurdianName" name="gurdianName" />
              </div>

              <div class="inputGroup">
                <label for="mobileNo">MOBILE NO</label>
                <input type="tel" id="mobileNo" name="mobileNo" />
              </div>
            </div>

            <div class="formFull">
              <label for="dateOfBirth">DATE OF BIRTH</label>
              <input type="date" id="dateOfBirth" name="dateOfBirth" />
            </div>

            <div class="formFull">
              <label for="email">E-MAIL</label>
              <input type="email" id="email" name="email" />
            </div>

            <div class="formFull">
              <label for="fathersName">FATHER'S NAME</label>
              <input type="text" id="fathersName" name="fathersName" />
            </div>

            <div class="formFull">
              <label for="mothersName">MOTHER'S NAME</label>
              <input type="text" id="mothersName" name="mothersName" />
            </div>

            <div class="formFull">
              <label for="presentAddress">PRESENT ADDRESS</label>
              <input type="text" id="presentAddress" name="presentAddress" />
            </div>

            <div class="formFull">
              <label for="permanentAddress">PERMANENT ADDRESS</label>
              <input
                type="text"
                id="permanentAddress"
                name="permanentAddress"
              />
            </div>

            <div class="formFull">
              <label for="courseName">COURSE NAME</label>
              <input type="text" id="courseName" name="courseName" />
            </div>

            <div class="formFull">
              <label for="batchNo">BATCH NO</label>
              <input type="text" id="batchNo" name="batchNo" />
            </div>

            <div class="formFull">
              <label for="courseDuration">COURSE DURATION</label>
              <input type="text" id="courseDuration" name="courseDuration" />
            </div>
          </form>
        </div>
      </section>
    </main>

    <footer>
      <div class="authorize signature">AUTHORIZED SIGNATURE</div>
      <div class="student signature">STUDENT'S SIGNATURE</div>
    </footer>
  </body>
</html>
